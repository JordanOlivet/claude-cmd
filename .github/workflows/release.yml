name: CI/CD

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Calculate version if PR merged with release-* label
  version:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    outputs:
      version: ${{ steps.calc.outputs.version }}
      should_release: ${{ steps.calc.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next version
        id: calc
        run: |
          # Get current version from Cargo.toml
          VERSION=$(grep -m1 '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')

          # Parse the version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          # Read PR labels
          LABELS='${{ toJson(github.event.pull_request.labels.*.name) }}'

          if echo "$LABELS" | grep -q "release-major"; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
            echo "should_release=true" >> $GITHUB_OUTPUT
          elif echo "$LABELS" | grep -q "release-minor"; then
            MINOR=$((MINOR + 1))
            PATCH=0
            echo "should_release=true" >> $GITHUB_OUTPUT
          elif echo "$LABELS" | grep -q "release-patch"; then
            PATCH=$((PATCH + 1))
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "No release label found, skipping release"
          fi

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

  # Build for validation (unmerged PR) or release (merged PR with label)
  build:
    needs: [version]
    # Runs if: unmerged PR (validation) OR merged PR with release label
    if: |
      always() &&
      (needs.version.result == 'skipped' || needs.version.outputs.should_release == 'true')
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: claude-cmd.exe
            asset_name: claude-cmd-windows-x86_64.exe

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: claude-cmd
            asset_name: claude-cmd-linux-x86_64

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: claude-cmd
            asset_name: claude-cmd-macos-x86_64

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: claude-cmd
            asset_name: claude-cmd-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} ${{ matrix.asset_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  # Update Cargo.toml and create GitHub release
  release:
    needs: [version, build]
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version in Cargo.toml
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          echo "Updated Cargo.toml to version $VERSION"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml
          git commit -m "chore: bump version to ${{ needs.version.outputs.version }}"
          git push

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: claude-cmd v${{ needs.version.outputs.version }}
          generate_release_notes: true
          files: |
            artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
